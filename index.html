<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tropa do Abílio</title>

  <!-- Fonte bonita -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #fff0f5;
      color: #333;
    }

    header {
      text-align: center;
      background: linear-gradient(135deg, #0B20A9, #4FAD08);
      padding: 40px 20px;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 700;
    }

    header p {
      margin-top: 5px;
      font-weight: 300;
    }

    .kits {
      padding: 30px;
      text-align: center;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 20px;
      border-radius: 20px;
      max-width: 320px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    .card h3 {
      color: #ff4d88;
      margin-top: 10px;
    }

    .preco {
      display: block;
      font-size: 24px;
      font-weight: 700;
      margin: 10px 0;
    }

    .botao {
      display: inline-block;
      padding: 12px 20px;
      background: #ff4d88;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .botao:hover {
      background: #e6005c;
    }

    .destaque {
      border: 2px solid #ff4d88;
    }

    footer {
      text-align: center;
      padding: 20px;
    }

    .whatsapp {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 30px;
    }

    .insta {
      margin-top: 15px;
    }

    .insta a {
      color: #ff4d88;
      text-decoration: none;
    }

    .direitos {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

<header>
  <h1>TDA</h1>
  <p>Venha com a tropa do abilio</p>
</header>

<section class="kits">
  <h2>O Abílio é um cara tranquilo e inteligente, seja como ele, peça conselhos com os contatos abaixo</h2>

       alt="Foto do Abílio" 
       style="max-width:300px; border-radius:15px; margin-top:20px;">

</section>

  <div class="direitos">

</footer>

</html>
